---
- name: update rhel, centos stream, and ubuntu systems
  hosts: all
  tasks:
    - name: update all packages
      when: ansible_facts['os_family'] == "RedHat"
      ansible.builtin.package:
        name: "*"
        state: latest
    - name: update all packages
      when: ansible_facts['os_family'] == "Debian"
      ansible.builtin.package:
        name: "*"
        state: latest
